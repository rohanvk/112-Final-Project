name: Build and Release Minesweeper

on:
  # Triggers the workflow only when you push a version tag (e.g., v1.0.0)
  push:
    tags:
      - "v*.*.*"
  # Keeps the manual trigger button just in case
  workflow_dispatch: 

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Changed from 3.14 to a currently stable release

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Windows EXE
      run: pyinstaller --onefile --windowed --name="Minesweeper" --icon="images/minesweeper.ico" --add-data "images;images" --add-data "audio;audio" main.py

    - name: Install Inno Setup
      run: choco install innosetup

    - name: Build the Windows Installer
      run: iscc installer.iss

    - name: Upload Windows Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: Output/*_Setup.exe

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Mac App
      run: pyinstaller --windowed --name="Minesweeper" --icon="images/minesweeper.icns" --add-data "images:images" --add-data "audio:audio" main.py

    - name: Package into DMG
      run: |
        # Flush pending filesystem writes and let background processes release locks
        sync
        sleep 5
        hdiutil create -volname "Minesweeper" -srcfolder "dist/Minesweeper.app" -ov -format UDZO "dist/Minesweeper.dmg"

    - name: Upload Mac DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mac-installer
        path: dist/*.dmg

  create-release:
    # This job waits for both builds to finish successfully before running
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    # Required permission to allow GitHub Actions to create the release page
    permissions:
      contents: write 
    
    steps:
    - name: Download Windows Installer
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: release-files

    - name: Download Mac Installer
      uses: actions/download-artifact@v4
      with:
        name: mac-installer
        path: release-files

    - name: Publish GitHub Release
      # Only runs this step if the workflow was triggered by a tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        # Grabs all .exe and .dmg files from the downloaded folders
        files: |
          release-files/*_Setup.exe
          release-files/*.dmg
        # Automatically generates release notes based on your recent commits!
        generate_release_notes: true
        append_body: true
        body: |
          ## Downloads
          | Platform | File |
          |---|---|
          | 🪟 **Windows** | `Minesweeper_Setup.exe` — Installer (recommended) |
          | 🍎 **Mac** | `Minesweeper.dmg` — Disk image |

          **Note for Mac Users:** 
          If you receive an error that the app is damaged or cannot be opened, you will need to bypass Apple's Gatekeeper quarantine for unsigned apps.
          Open your terminal and run:
          `xattr -cr /path/to/your/extracted/Minesweeper.app`